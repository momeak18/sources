name: Build Aidoku sources

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "sources/multi.ehentai/**"
      - "sources/zh.xiurenai/**"
      - ".github/workflows/build.yaml"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            sources/multi.ehentai/target
            sources/zh.xiurenai/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Aidoku CLI
        run: |
          if ! command -v aidoku >/dev/null 2>&1; then
            cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli
          fi

      - name: Build E-Hentai source
        run: |
          cd sources/multi.ehentai
          aidoku package

      - name: Build XiurenAi source
        run: |
          cd sources/zh.xiurenai
          aidoku package

      - name: Build source list
        run: |
          aidoku build \
            sources/multi.ehentai/package.aix \
            sources/zh.xiurenai/package.aix \
            --name "My Aidoku Sources"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.2
        with:
          branch: gh-pages
          folder: public
          git-config-name: GitHub Actions
          git-config-email: github-actions[bot]@users.noreply.github.com
          commit-message: Update Aidoku sources
          single-commit: true

      - name: Upload AIX package
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: aix-packages
          path: |
            sources/multi.ehentai/package.aix
            sources/zh.xiurenai/package.aix
          if-no-files-found: warn

      - name: Upload source repository
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: aidoku-repository
          path: public
          if-no-files-found: warn
